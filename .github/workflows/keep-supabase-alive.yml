name: Keep Supabase Alive

# Supabase free tier auto-pauses projects after 7 days of inactivity.
# This workflow runs a real PostgREST query every 3 days so the project
# stays warm. Manual runs (workflow_dispatch) are useful for verifying
# secrets after setup.

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1")

          echo "HTTP status: $STATUS"
          echo "Response body:"
          cat /tmp/response.json
          echo

          if [ "$STATUS" != "200" ]; then
            echo "::error::Keep-alive ping failed with HTTP $STATUS"
            exit 1
          fi

          echo "Keep-alive ping succeeded"
